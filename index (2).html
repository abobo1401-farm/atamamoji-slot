<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>しるこスロット</title>
<style>
  :root{
    --pink:#ff2da0; --gold:#ffd21f; --dark:#180014; --brown:#210000;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0; min-height:100vh; overflow:hidden; font-family:"Hiragino Maru Gothic ProN","Yu Gothic",Meiryo,sans-serif; color:#fff; background:radial-gradient(circle at 50% 35%, #7b004d 0%, #300026 35%, #09000d 72%); touch-action:manipulation;}
  .bg:before{content:"";position:fixed;inset:-20%;background:repeating-conic-gradient(from 0deg, rgba(255,0,130,.28) 0 5deg, transparent 5deg 12deg);filter:blur(2px);opacity:.55;animation:spin 28s linear infinite;transform-origin:center}.bg:after{content:"★ ✦ ★ ✦ ★ ✦ ★ ✦ ★ ✦ ★";position:fixed;inset:0;font-size:42px;letter-spacing:54px;line-height:150px;color:#ff4fb3;text-shadow:0 0 18px #ff4fb3,0 0 30px #ffbd00;opacity:.65;word-break:break-all;pointer-events:none}@keyframes spin{to{transform:rotate(360deg)}}
  .wrap{position:relative;z-index:1; width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 14px 24px;gap:18px}.title{font-weight:900;font-size:clamp(28px,5vw,60px);color:#fff;text-shadow:0 0 10px var(--pink),0 0 22px var(--pink);letter-spacing:.08em}.machine{width:min(96vw,1050px);border-radius:38px;padding:18px;background:linear-gradient(180deg,#ff26b5,#ffd21f 17%,#d27300 48%,#ff2da0);box-shadow:0 0 18px #ff2da0,0 0 34px rgba(255,45,160,.9), inset 0 0 0 5px #fff58a}.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.slot{height:clamp(150px,28vw,270px);border-radius:28px;background:linear-gradient(180deg,#fffef9,#fff4ef);border:7px solid #2a0500;box-shadow:inset 0 0 0 8px rgba(0,0,0,.12),0 7px 0 rgba(60,0,0,.7);display:flex;align-items:center;justify-content:center;overflow:hidden}.char{font-size:clamp(96px,21vw,210px);font-weight:1000;color:#210000;-webkit-text-stroke:clamp(5px,1vw,10px) var(--gold);text-shadow:0 0 0 #000,0 5px 0 #a95800,0 0 16px var(--pink),0 0 30px var(--pink);line-height:1}.rolling .first{animation:bounce .07s linear infinite}@keyframes bounce{0%{transform:translateY(-16px)}100%{transform:translateY(16px)}}.word{font-size:clamp(64px,14vw,150px);font-weight:1000;color:#210000;-webkit-text-stroke:clamp(4px,.8vw,8px) var(--gold);text-shadow:0 5px 0 #8d4c00,0 0 14px var(--pink),0 0 28px var(--pink)}.result{height:46px;font-size:clamp(24px,4vw,44px);font-weight:900;text-shadow:0 0 12px #ff2da0}.result.hit{color:#fff700;animation:flash .35s alternate infinite}.result.miss{color:#fff}@keyframes flash{from{transform:scale(1)}to{transform:scale(1.08)}}.controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}.btn{border:0;border-radius:999px;padding:16px 28px;font-size:22px;font-weight:900;color:#fff;background:linear-gradient(180deg,#ff2da0,#b40063);box-shadow:0 6px 0 #610036,0 0 18px rgba(255,45,160,.7)}.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #610036}.btn.stop{background:linear-gradient(180deg,#ffd21f,#e17700);box-shadow:0 6px 0 #7a3600,0 0 18px rgba(255,210,31,.7);color:#240000}.panel{position:fixed;right:12px;top:12px;z-index:5}.gear{width:54px;height:54px;border-radius:50%;border:2px solid rgba(255,255,255,.7);background:rgba(20,0,20,.65);color:#fff;font-size:28px}.settings{display:none;position:fixed;right:12px;top:76px;width:min(92vw,420px);max-height:80vh;overflow:auto;background:rgba(15,0,20,.94);border:2px solid rgba(255,255,255,.25);border-radius:20px;padding:16px;box-shadow:0 0 28px rgba(255,45,160,.55)}.settings.open{display:block}.settings label{display:block;font-weight:800;margin:10px 0 5px}.settings input,.settings textarea,.settings select{width:100%;font-size:18px;border-radius:12px;border:1px solid #777;padding:10px;background:#fff;color:#111}.settings textarea{height:120px}.small{font-size:13px;opacity:.8}.confetti{position:fixed;inset:0;pointer-events:none;z-index:4}.piece{position:absolute;width:10px;height:18px;background:#fff700;animation:fall 1.8s ease-out forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
  @media(max-width:600px){.wrap{justify-content:flex-start;padding-top:70px}.title{font-size:28px}.machine{border-radius:24px;padding:10px}.slots{gap:7px}.slot{border-width:4px;border-radius:18px;height:30vw}.char{font-size:26vw;-webkit-text-stroke:4px var(--gold)}.word{font-size:22vw}.btn{font-size:20px;padding:15px 24px}.result{height:34px}}
</style>
</head>
<body>
<div class="bg"></div><div class="confetti" id="confetti"></div>
<div class="panel"><button class="gear" id="gear">⚙</button><div class="settings" id="settings">
  <label>当たり単語</label><input id="target" value="しるこ" maxlength="3">
  <label>成功率</label><select id="rate"><option value="10">1/10</option><option value="5">1/5</option><option value="20">1/20</option><option value="50">1/50</option><option value="1">必ず成功</option></select>
  <label>候補文字（1行に1文字）</label><textarea id="candidates">あ
い
う
え
お
か
き
く
け
こ
さ
し
す
せ
そ
た
ち
つ
て
と
な
に
ぬ
ね
の
は
ひ
ふ
へ
ほ
ま
み
む
め
も
や
ゆ
よ
ら
り
る
れ
ろ
わ</textarea>
  <p class="small">※当たり単語は3文字想定。例：しるこ → □るこ。設定はこの端末に保存されます。</p>
  <button class="btn" id="save">保存</button>
</div></div>
<div class="wrap" id="wrap">
  <div class="title">🎰 しるこスロット</div>
  <div class="machine" id="machine"><div class="slots">
    <div class="slot"><div class="char first" id="first">□</div></div>
    <div class="slot"><div class="char" id="second">る</div></div>
    <div class="slot"><div class="char" id="third">こ</div></div>
  </div></div>
  <div class="word" id="word">□るこ</div>
  <div class="result" id="result">スタートを押してね</div>
  <div class="controls"><button class="btn" id="start">スタート</button><button class="btn stop" id="stop">ストップ</button></div>
</div>
<script>
const $=id=>document.getElementById(id);let timer=null,rolling=false,tries=0,hits=0;let cfg={target:'しるこ',rate:10,candidates:[]};
function load(){const saved=localStorage.getItem('sirukoSlotCfg');if(saved){try{const s=JSON.parse(saved);$('target').value=s.target||'しるこ';$('rate').value=String(s.rate||10);$('candidates').value=(s.candidates||[]).join('\n')||$('candidates').value}catch(e){}}apply();}
function apply(){cfg.target=($('target').value||'しるこ').trim();if(cfg.target.length<2)cfg.target='しるこ';cfg.rate=Number($('rate').value)||10;cfg.candidates=$('candidates').value.split(/\n|,|、|\s+/).map(s=>s.trim()).filter(Boolean).map(s=>[...s][0]);if(!cfg.candidates.length)cfg.candidates=['あ','い','う','え','お','し','ま','な','た'];$('second').textContent=[...cfg.target][1]||'る';$('third').textContent=[...cfg.target][2]||'こ';$('first').textContent='□';$('word').textContent='□'+[...cfg.target].slice(1).join('');}
function save(){apply();localStorage.setItem('sirukoSlotCfg',JSON.stringify(cfg));$('settings').classList.remove('open');}
function rand(){return cfg.candidates[Math.floor(Math.random()*cfg.candidates.length)]||'あ'}
function start(){if(rolling)return;apply();rolling=true;$('machine').classList.add('rolling');$('result').className='result';$('result').textContent='回転中…';timer=setInterval(()=>{$('first').textContent=rand();$('word').textContent=$('first').textContent+[...cfg.target].slice(1).join('')},55)}
function stop(){if(!rolling)return;clearInterval(timer);rolling=false;$('machine').classList.remove('rolling');tries++;const targetFirst=[...cfg.target][0];const hit=Math.floor(Math.random()*cfg.rate)===0;let final=hit?targetFirst:rand();let guard=0;while(!hit && final===targetFirst && guard<50){final=rand();guard++}$('first').textContent=final;const fixed=[...cfg.target].slice(1).join('');$('word').textContent=final+fixed;if(hit){hits++;$('result').className='result hit';$('result').textContent='大当たり！ '+cfg.target+' 完成！！';confetti()}else{$('result').className='result miss';$('result').textContent='ハズレ！ '+final+fixed+' になっちゃった！ 笑'}}
function confetti(){const area=$('confetti');area.innerHTML='';for(let i=0;i<80;i++){const p=document.createElement('div');p.className='piece';p.style.left=Math.random()*100+'vw';p.style.top='-30px';p.style.background=['#fff700','#ff2da0','#ffffff','#ffd21f','#66f'][i%5];p.style.animationDelay=Math.random()*.45+'s';area.appendChild(p)}setTimeout(()=>area.innerHTML='',2300)}
$('gear').onclick=()=>$('settings').classList.toggle('open');$('save').onclick=save;$('start').onclick=start;$('stop').onclick=stop;document.addEventListener('keydown',e=>{if(e.code==='Space'){rolling?stop():start()}});load();
</script>
</body>
</html>
