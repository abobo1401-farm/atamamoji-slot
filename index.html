<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>しるこスロット</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:'Yu Gothic','Hiragino Sans','Meiryo',sans-serif;background:#16001f;color:#fff;touch-action:manipulation;user-select:none}
  body{background:
    radial-gradient(circle at 50% 20%, rgba(255,0,150,.55), transparent 32%),
    radial-gradient(circle at 50% 50%, rgba(255,180,0,.25), transparent 22%),
    radial-gradient(circle at 20% 80%, rgba(255,0,200,.35), transparent 25%),
    linear-gradient(180deg,#100018 0%,#24002d 55%,#09000f 100%);}
  .stars{position:fixed;inset:0;pointer-events:none;background-image:
    radial-gradient(#fff 1.5px, transparent 2px),radial-gradient(#ff4bd8 2px, transparent 3px),radial-gradient(#ffd32a 2px, transparent 3px);
    background-size:90px 90px,140px 140px,180px 180px;animation:twinkle 3s infinite alternate;opacity:.9}
  @keyframes twinkle{from{filter:brightness(.8)}to{filter:brightness(1.4)}}
  .wrap{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 12px 96px;gap:14px}
  .title{font-weight:900;font-size:clamp(24px,7vw,42px);letter-spacing:.04em;text-shadow:0 0 10px #ff1493,0 4px 0 #5b001d;color:#fff}
  .slotFrame{width:min(96vw,780px);border-radius:28px;padding:10px;background:linear-gradient(180deg,#ff31c8,#fff02a 18%,#ff9100 45%,#ff31c8 100%);box-shadow:0 0 22px #ff1cc8, inset 0 0 0 4px #fff;}
  .reels{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;background:#4a1600;border-radius:22px;padding:8px}
  .reel{height:clamp(130px,34vw,230px);border-radius:20px;background:linear-gradient(180deg,#fff,#fff9f0);display:flex;align-items:center;justify-content:center;border:5px solid #210006;box-shadow:inset 0 0 0 5px #e7c6aa,0 2px 0 #fff;color:#230006;overflow:hidden}
  .letter{font-size:clamp(74px,22vw,170px);font-weight:1000;line-height:1;text-shadow:4px 0 #ffcf24,-4px 0 #ffcf24,0 4px #ffcf24,0 -4px #ffcf24,0 0 12px #ff39c7;transform:translateY(-2px)}
  .rolling .first{animation:bounce .08s infinite alternate}
  @keyframes bounce{from{transform:translateY(-8px) scale(1.03)}to{transform:translateY(8px) scale(.98)}}
  .subtitle{font-size:clamp(46px,16vw,110px);font-weight:1000;color:#280006;text-shadow:4px 0 #ffd72c,-4px 0 #ffd72c,0 4px #ffd72c,0 -4px #ffd72c,0 0 16px #ff2bbc,0 8px 0 #9b0037;line-height:.95}
  .message{min-height:38px;font-size:clamp(20px,6vw,36px);font-weight:900;text-shadow:0 0 10px #ff2bbc;text-align:center}
  .panel{position:fixed;left:0;right:0;bottom:0;z-index:5;background:rgba(15,0,25,.86);backdrop-filter:blur(10px);border-top:1px solid rgba(255,255,255,.25);padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px}
  button,input,select,textarea{font:inherit;border:0;border-radius:14px}
  .mainBtn{grid-column:1/3;height:56px;font-size:24px;font-weight:900;color:#fff;background:linear-gradient(180deg,#18e56e,#039e3c);box-shadow:0 5px 0 #005c20}
  .stop{background:linear-gradient(180deg,#ff3b78,#c50039);box-shadow:0 5px 0 #74001e}
  .miniBtn{height:42px;background:#fff;color:#301;font-weight:800}
  .settings{position:fixed;z-index:10;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end}.settings.open{display:flex}
  .sheet{width:100%;max-height:86dvh;overflow:auto;background:#fff;color:#222;border-radius:22px 22px 0 0;padding:18px 16px calc(20px + env(safe-area-inset-bottom))}
  .sheet h2{margin:0 0 10px;font-size:22px}.row{margin:12px 0}.row label{display:block;font-weight:800;margin-bottom:5px}.row input,.row select,.row textarea{width:100%;padding:12px;background:#f1f1f5;color:#111;border:1px solid #ddd}.row textarea{height:110px;resize:vertical}.closeBtn{width:100%;height:48px;background:#222;color:#fff;font-weight:900;margin-top:10px}.successFlash{animation:flash .9s ease-in-out 3}@keyframes flash{50%{filter:brightness(2.3) saturate(1.8)}}
  .confetti{position:fixed;inset:0;pointer-events:none;z-index:4;overflow:hidden}.piece{position:absolute;width:10px;height:18px;background:#fff;animation:fall 1.8s linear forwards}@keyframes fall{to{transform:translateY(110dvh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="stars"></div><div class="confetti" id="confetti"></div>
<div class="wrap" id="stage">
  <div class="title">🎰 しるこスロット</div>
  <div class="slotFrame" id="slotFrame"><div class="reels">
    <div class="reel"><div class="letter first" id="first">□</div></div>
    <div class="reel"><div class="letter" id="second">る</div></div>
    <div class="reel"><div class="letter" id="third">こ</div></div>
  </div></div>
  <div class="subtitle" id="bottomText">だよ</div>
  <div class="message" id="message">スタートを押してね</div>
</div>
<div class="panel">
  <button class="mainBtn" id="startStop">START</button>
  <button class="miniBtn" id="reset">リセット</button>
  <button class="miniBtn" id="openSettings">設定</button>
</div>
<div class="settings" id="settings"><div class="sheet">
  <h2>設定</h2>
  <div class="row"><label>成功率</label><select id="rateInput"><option value="20">20％</option><option value="10" selected>10％</option><option value="5">5％</option><option value="100">必ず成功</option></select></div>
  <div class="row"><label>ルーレット候補（1文字ずつ / 改行かカンマ区切り）</label><textarea id="charsInput">あ,い,う,え,お,か,き,く,け,こ,さ,し,す,せ,そ,た,ち,つ,て,と,な,に,ぬ,ね,の,は,ひ,ふ,へ,ほ,ま,み,む,め,も,や,ゆ,よ,ら,り,る,れ,ろ,わ,が,ぎ,ぐ,げ,ご,ざ,じ,ず,ぜ,ぞ,だ,ぢ,づ,で,ど,ば,び,ぶ,べ,ぼ,ぱ,ぴ,ぷ,ぺ,ぽ,ゔ</textarea></div>
  <div class="row"><label>下の文字</label><input id="bottomInput" value="だよ" /></div>
  <button class="closeBtn" id="saveSettings">保存して閉じる</button>
</div></div>
<script>
const $=id=>document.getElementById(id);
let timer=null,rolling=false,current='□',tries=0,wins=0;
const TARGET_WORD='しるこ';
const DEFAULT_CHARS='あ,い,う,え,お,か,き,く,け,こ,さ,し,す,せ,そ,た,ち,つ,て,と,な,に,ぬ,ね,の,は,ひ,ふ,へ,ほ,ま,み,む,め,も,や,ゆ,よ,ら,り,る,れ,ろ,わ,が,ぎ,ぐ,げ,ご,ざ,じ,ず,ぜ,ぞ,だ,ぢ,づ,で,ど,ば,び,ぶ,べ,ぼ,ぱ,ぴ,ぷ,ぺ,ぽ,ゔ';

// 効果音：スマホで毎回ラグりにくい Web Audio 方式
// GitHubに piko.mp3 / pon.mp3 / success.mp3 / fail.mp3 / voice.mp3 を置く
const SOUND_FILES={piko:'piko.mp3',pon:'pon.mp3',success:'success.mp3',fail:'fail.mp3',voice:'voice.mp3'};
let audioCtx=null;
const audioBuffers={};
const fallbackSounds={};
Object.keys(SOUND_FILES).forEach(name=>{
  const a=new Audio(SOUND_FILES[name]);
  a.preload='auto';
  a.load();
  fallbackSounds[name]=a;
});

function ensureAudioCtx(){
  try{
    if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
  }catch(e){}
}
async function preloadOneSound(name){
  if(audioBuffers[name]) return;
  try{
    ensureAudioCtx();
    if(!audioCtx) return;
    const res=await fetch(SOUND_FILES[name],{cache:'force-cache'});
    if(!res.ok) return;
    const arr=await res.arrayBuffer();
    audioBuffers[name]=await audioCtx.decodeAudioData(arr);
  }catch(e){}
}
function preloadSounds(){ Object.keys(SOUND_FILES).forEach(preloadOneSound); }
function unlockAudio(){
  ensureAudioCtx();
  preloadSounds();
  // iPhone対策：初回タップで音声権限だけ開ける
  try{
    if(audioCtx){
      const b=audioCtx.createBuffer(1,1,22050);
      const s=audioCtx.createBufferSource();
      s.buffer=b;
      s.connect(audioCtx.destination);
      s.start(0);
    }
  }catch(e){}
}
function playSound(name){
  try{
    ensureAudioCtx();
    const buf=audioBuffers[name];
    if(audioCtx && buf){
      const src=audioCtx.createBufferSource();
      src.buffer=buf;
      src.connect(audioCtx.destination);
      src.start(0);
      return;
    }
  }catch(e){}
  // 読み込み前だけHTMLAudioで代用
  const base=fallbackSounds[name];
  if(!base) return;
  try{
    const a=base.cloneNode();
    a.preload='auto';
    a.volume=1;
    const r=a.play();
    if(r && r.catch) r.catch(()=>{});
  }catch(e){}
}
function playSuccessSounds(){
  playSound('success');
  setTimeout(()=>playSound('voice'),900);
}
preloadSounds();
window.addEventListener('pointerdown',unlockAudio,{once:true,passive:true});
window.addEventListener('touchstart',unlockAudio,{once:true,passive:true});

function splitChars(v){
  return v.split(/[、,\n\s]+/)
    .map(s=>s.trim())
    .filter(Boolean)
    .map(s=>[...s][0])
    .filter(s=>s!=='を' && s!=='ん' && s!=='ゃ' && s!=='ゅ' && s!=='ょ' && s!=='っ');
}
function unique(arr){return [...new Set(arr)];}
function getConfig(){
  const chars=unique(splitChars($('charsInput').value || DEFAULT_CHARS));
  return{
    word:TARGET_WORD,
    rate:parseInt($('rateInput').value,10)||10,
    chars:chars.length?chars:splitChars(DEFAULT_CHARS),
    bottom:$('bottomInput').value||'だよ'
  }
}
function applyWord(){
  const c=getConfig();
  const arr=[...c.word];
  $('second').textContent=arr[1]||'る';
  $('third').textContent=arr.slice(2).join('')||'こ';
  $('bottomText').textContent=c.bottom;
}
function start(){
  playSound('piko');
  applyWord();
  const c=getConfig();
  rolling=true;
  $('stage').classList.add('rolling');
  $('startStop').textContent='STOP';
  $('startStop').classList.add('stop');
  $('message').textContent='回転中…';
  timer=setInterval(()=>{
    const chars=c.chars;
    current=chars[Math.floor(Math.random()*chars.length)];
    $('first').textContent=current;
  },55)
}
function stop(){
  playSound('pon');
  clearInterval(timer);
  timer=null;
  rolling=false;
  $('stage').classList.remove('rolling');
  $('startStop').textContent='START';
  $('startStop').classList.remove('stop');

  const c=getConfig();
  const target=[...c.word][0]||'し';
  tries++;

  let hit=false;
  if(c.rate>=100){ hit=true; }
  else{ hit=Math.random()*100 < c.rate; }

  if(hit){
    current=target;
  }else{
    let pool=c.chars.filter(x=>x!==target);
    if(!pool.length) pool=splitChars(DEFAULT_CHARS).filter(x=>x!==target);
    current=pool[Math.floor(Math.random()*pool.length)]||'あ';
  }

  $('first').textContent=current;
  const result=current+[...c.word].slice(1).join('');

  if(current===target){
    wins++;
    $('message').textContent='🎉 '+result+' 完成！！';
    $('slotFrame').classList.add('successFlash');
    confetti();
    playSuccessSounds();
    setTimeout(()=>$('slotFrame').classList.remove('successFlash'),2600)
  }else{
    $('message').textContent=result+'… ざんねん！';
    playSound('fail');
  }
  localStorage.setItem('sirukoSlotStats',JSON.stringify({tries,wins}));
}
function confetti(){
  const box=$('confetti');
  box.innerHTML='';
  const colors=['#ff36c8','#fff02a','#31ff8b','#ffffff','#ff7a00'];
  for(let i=0;i<80;i++){
    const p=document.createElement('div');
    p.className='piece';
    p.style.left=Math.random()*100+'%';
    p.style.top='-30px';
    p.style.background=colors[i%colors.length];
    p.style.animationDelay=Math.random()*.4+'s';
    p.style.transform='rotate('+Math.random()*360+'deg)';
    box.appendChild(p)
  }
  setTimeout(()=>box.innerHTML='',2200)
}
$('startStop').onclick=()=>rolling?stop():start();
$('reset').onclick=()=>{$('first').textContent='□';$('message').textContent='スタートを押してね'};
$('openSettings').onclick=()=>{$('settings').classList.add('open')};
$('saveSettings').onclick=()=>{
  const c=getConfig();
  localStorage.setItem('sirukoSlotConfig',JSON.stringify({rate:c.rate,chars:c.chars,bottom:c.bottom}));
  $('charsInput').value=c.chars.join(',');
  $('settings').classList.remove('open');
  applyWord()
};
$('settings').onclick=e=>{if(e.target===$('settings'))$('settings').classList.remove('open')};

try{
  const saved=JSON.parse(localStorage.getItem('sirukoSlotConfig')||'null');
  if(saved){
    $('rateInput').value=String(saved.rate||10);
    $('charsInput').value=(saved.chars&&saved.chars.length?saved.chars:splitChars(DEFAULT_CHARS)).filter(s=>s!=='を'&&s!=='ん').join(',');
    $('bottomInput').value=saved.bottom||'だよ';
  }else{
    $('charsInput').value=DEFAULT_CHARS;
  }
  const st=JSON.parse(localStorage.getItem('sirukoSlotStats')||'null');
  if(st){tries=st.tries||0;wins=st.wins||0}
}catch(e){
  $('charsInput').value=DEFAULT_CHARS;
}
applyWord();
</script>
</body>
</html>
