<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>しるこスロット</title>
<style>
  :root{
    --bg1:#25104d;
    --bg2:#ff6aa2;
    --accent:#ffe66d;
    --pink:#ff4fa3;
    --blue:#36d6ff;
    --white:#fff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    min-height:100svh;
    font-family:"Hiragino Maru Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    color:#fff;
    overflow:hidden;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.25), transparent 12%),
      radial-gradient(circle at 80% 18%, rgba(255,230,109,.35), transparent 14%),
      radial-gradient(circle at 50% 85%, rgba(54,214,255,.22), transparent 18%),
      linear-gradient(135deg,var(--bg1),#6d2ec7 46%,var(--bg2));
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,.65) 0 2px, transparent 3px),
      radial-gradient(circle, rgba(255,230,109,.5) 0 2px, transparent 3px);
    background-size:58px 58px, 88px 88px;
    background-position:0 0, 24px 30px;
    opacity:.45;
    pointer-events:none;
  }
  .app{
    position:relative;
    z-index:1;
    width:min(920px,100%);
    min-height:100svh;
    margin:0 auto;
    padding:clamp(14px,3vw,26px);
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  header{text-align:center;padding-top:8px;}
  .title{
    display:inline-block;
    margin:0;
    padding:10px 20px;
    font-size:clamp(26px,7vw,58px);
    line-height:1.05;
    color:#fff;
    text-shadow:0 4px 0 #9b2374,0 0 22px rgba(255,255,255,.55);
    transform:rotate(-1.5deg);
  }
  .subtitle{
    margin:0 auto;
    display:inline-block;
    padding:6px 16px;
    font-size:clamp(14px,3.5vw,24px);
    font-weight:900;
    color:#552300;
    background:linear-gradient(#fff7b0,#ffd447);
    border-radius:999px;
    box-shadow:0 5px 0 rgba(101,57,0,.35);
  }
  .slotWrap{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6px 0;
  }
  .slot{
    display:flex;
    gap:clamp(8px,2vw,18px);
    align-items:center;
    justify-content:center;
    width:100%;
  }
  .charBox{
    width:clamp(86px,26vw,190px);
    height:clamp(100px,28vw,220px);
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:28px;
    font-size:clamp(64px,20vw,158px);
    font-weight:1000;
    color:#2b1260;
    background:linear-gradient(180deg,#fff,#f3efff);
    border:6px solid rgba(255,255,255,.95);
    box-shadow:0 14px 0 rgba(32,10,74,.35),0 0 32px rgba(255,255,255,.55) inset;
    text-shadow:0 4px 0 rgba(255,255,255,.85);
  }
  .rolling{
    color:#ff2d8d;
    animation:shake .08s infinite alternate;
  }
  @keyframes shake{
    from{transform:translateY(-3px) rotate(-1deg)}
    to{transform:translateY(3px) rotate(1deg)}
  }
  .success .charBox{
    color:#6b3a00;
    background:linear-gradient(180deg,#fff8bd,#ffd33d 55%,#ffb300);
    box-shadow:0 14px 0 rgba(88,45,0,.45),0 0 44px rgba(255,239,84,.95);
    animation:successPulse .55s ease-in-out infinite alternate;
  }
  @keyframes successPulse{to{transform:scale(1.05);filter:brightness(1.15)}}
  .message{
    min-height:44px;
    text-align:center;
    font-size:clamp(20px,5vw,42px);
    font-weight:1000;
    color:#fff;
    text-shadow:0 4px 0 rgba(0,0,0,.25),0 0 18px rgba(255,255,255,.65);
  }
  .controls{
    background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.35);
    border-radius:24px;
    padding:14px;
    backdrop-filter:blur(8px);
    box-shadow:0 12px 32px rgba(0,0,0,.18);
  }
  .mainBtn{
    width:100%;
    border:0;
    border-radius:22px;
    padding:18px 12px;
    font-size:clamp(24px,7vw,44px);
    font-weight:1000;
    color:#fff;
    background:linear-gradient(180deg,#ff7ab8,#ff208a);
    box-shadow:0 9px 0 #9e0f5a,0 0 24px rgba(255,255,255,.3) inset;
    cursor:pointer;
  }
  .mainBtn:active{transform:translateY(5px);box-shadow:0 4px 0 #9e0f5a;}
  .settings{
    margin-top:12px;
    display:grid;
    gap:10px;
  }
  label{font-weight:900;font-size:15px;}
  select,button.small{
    width:100%;
    font-size:18px;
    font-weight:900;
    padding:12px;
    border-radius:14px;
    border:3px solid rgba(255,255,255,.85);
    background:#fff;
    color:#3b1c66;
  }
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  button.small{background:#fff7b0;cursor:pointer;}
  .hint{
    opacity:.9;
    text-align:center;
    font-size:12px;
    line-height:1.5;
  }
  .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:5;}
  .piece{position:absolute;width:10px;height:18px;top:-24px;animation:fall 1.8s linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  @media (min-width:700px){.settings{grid-template-columns:1fr 1fr}.mainBtn{max-width:520px;margin:0 auto;display:block}.controls{max-width:720px;margin:0 auto 10px;width:100%;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1 class="title">🎰 しるこスロット</h1><br>
    <div class="subtitle">頭文字が「し」なら成功！</div>
  </header>

  <main class="slotWrap">
    <div id="slot" class="slot" aria-live="polite">
      <div id="head" class="charBox">あ</div>
      <div class="charBox">る</div>
      <div class="charBox">こ</div>
    </div>
  </main>

  <div id="message" class="message">STARTを押してね</div>

  <section class="controls">
    <button id="mainBtn" class="mainBtn">START</button>
    <div class="settings">
      <div>
        <label for="rate">成功率</label>
        <select id="rate">
          <option value="0.20">20％</option>
          <option value="0.10" selected>10％</option>
          <option value="0.05">5％</option>
          <option value="1">必ず成功</option>
        </select>
      </div>
      <div>
        <label for="sound">効果音</label>
        <select id="sound">
          <option value="on" selected>ON</option>
          <option value="off">OFF</option>
        </select>
      </div>
    </div>
    <div class="row" style="margin-top:10px;">
      <button id="resetBtn" class="small">表示リセット</button>
      <button id="testBtn" class="small">音テスト</button>
    </div>
    <div class="hint">音源ファイル名：piko.mp3 / pon.mp3 / success.mp3 / fail.mp3 / voice.mp3</div>
  </section>
</div>
<div id="confetti" class="confetti"></div>

<script>
(() => {
  'use strict';

  const CANDIDATES = [
    'あ','い','う','え','お',
    'か','き','く','け','こ',
    'さ','し','す','せ','そ',
    'た','ち','つ','て','と',
    'な','に','ぬ','ね','の',
    'は','ひ','ふ','へ','ほ',
    'ま','み','む','め','も',
    'や','ゆ','よ',
    'ら','り','る','れ','ろ',
    'わ',
    'が','ぎ','ぐ','げ','ご',
    'ざ','じ','ず','ぜ','ぞ',
    'だ','ぢ','づ','で','ど',
    'ば','び','ぶ','べ','ぼ',
    'ぱ','ぴ','ぷ','ぺ','ぽ',
    'ゔ'
  ];

  const SUCCESS_CHAR = 'し';
  const head = document.getElementById('head');
  const slot = document.getElementById('slot');
  const message = document.getElementById('message');
  const mainBtn = document.getElementById('mainBtn');
  const rate = document.getElementById('rate');
  const sound = document.getElementById('sound');
  const resetBtn = document.getElementById('resetBtn');
  const testBtn = document.getElementById('testBtn');
  const confetti = document.getElementById('confetti');

  let timer = null;
  let rolling = false;
  let idx = 0;

  const sounds = {
    piko: new Audio('piko.mp3'),
    pon: new Audio('pon.mp3'),
    success: new Audio('success.mp3'),
    fail: new Audio('fail.mp3'),
    voice: new Audio('voice.mp3')
  };
  Object.values(sounds).forEach(a => {
    a.preload = 'auto';
    a.volume = 1;
  });

  function saveSettings(){
    localStorage.setItem('siruko-slot-rate', rate.value);
    localStorage.setItem('siruko-slot-sound', sound.value);
  }
  function loadSettings(){
    const r = localStorage.getItem('siruko-slot-rate');
    const s = localStorage.getItem('siruko-slot-sound');
    if(r) rate.value = r;
    if(s) sound.value = s;
  }

  function play(name){
    if(sound.value !== 'on') return;
    const a = sounds[name];
    if(!a) return;
    try{
      a.pause();
      a.currentTime = 0;
      const p = a.play();
      if(p && typeof p.catch === 'function') p.catch(()=>{});
    }catch(e){}
  }

  function playSuccessSequence(){
    play('success');
    if(sound.value !== 'on') return;
    setTimeout(() => play('voice'), 850);
  }

  function start(){
    if(rolling) return;
    saveSettings();
    rolling = true;
    slot.classList.remove('success');
    head.classList.add('rolling');
    message.textContent = '回転中…';
    mainBtn.textContent = 'STOP';
    play('piko');
    timer = setInterval(() => {
      idx = (idx + 1) % CANDIDATES.length;
      head.textContent = CANDIDATES[idx];
    }, 48);
  }

  function stop(){
    if(!rolling) return;
    rolling = false;
    clearInterval(timer);
    timer = null;
    head.classList.remove('rolling');
    mainBtn.textContent = 'START';
    play('pon');

    const isSuccess = Math.random() < Number(rate.value);
    const finalChar = isSuccess ? SUCCESS_CHAR : randomFailChar();
    animateStop(finalChar, () => {
      if(isSuccess){
        head.textContent = SUCCESS_CHAR;
        slot.classList.add('success');
        message.textContent = '🎉 しるこ完成！！';
        burstConfetti();
        setTimeout(playSuccessSequence, 260);
      }else{
        head.textContent = finalChar;
        slot.classList.remove('success');
        message.textContent = finalChar + 'るこ… チーン';
        setTimeout(() => play('fail'), 260);
      }
    });
  }

  function animateStop(finalChar, done){
    let count = 0;
    const max = 12;
    const t = setInterval(() => {
      count++;
      head.textContent = CANDIDATES[Math.floor(Math.random() * CANDIDATES.length)];
      if(count >= max){
        clearInterval(t);
        head.textContent = finalChar;
        done();
      }
    }, 70);
  }

  function randomFailChar(){
    const list = CANDIDATES.filter(c => c !== SUCCESS_CHAR);
    return list[Math.floor(Math.random() * list.length)];
  }

  function reset(){
    if(timer) clearInterval(timer);
    timer = null;
    rolling = false;
    head.textContent = 'あ';
    head.classList.remove('rolling');
    slot.classList.remove('success');
    message.textContent = 'STARTを押してね';
    mainBtn.textContent = 'START';
    confetti.innerHTML = '';
  }

  function burstConfetti(){
    confetti.innerHTML = '';
    const colors = ['#fff200','#ff4fa3','#36d6ff','#ffffff','#8cff6a'];
    for(let i=0;i<90;i++){
      const p = document.createElement('div');
      p.className = 'piece';
      p.style.left = Math.random()*100 + 'vw';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDelay = (Math.random()*0.35) + 's';
      p.style.animationDuration = (1.2 + Math.random()*1.1) + 's';
      p.style.transform = 'rotate(' + Math.random()*360 + 'deg)';
      confetti.appendChild(p);
    }
    setTimeout(()=>{ confetti.innerHTML = ''; }, 2600);
  }

  mainBtn.addEventListener('click', () => rolling ? stop() : start());
  resetBtn.addEventListener('click', reset);
  testBtn.addEventListener('click', () => {
    play('piko');
    setTimeout(()=>play('pon'), 420);
    setTimeout(()=>play('success'), 850);
    setTimeout(()=>play('fail'), 1350);
  });
  rate.addEventListener('change', saveSettings);
  sound.addEventListener('change', saveSettings);
  document.addEventListener('keydown', e => {
    if(e.code === 'Space'){
      e.preventDefault();
      rolling ? stop() : start();
    }
  });

  loadSettings();
})();
</script>
</body>
</html>
